<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Bootstrap Carousel - MindRise</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="Styles/bootstrap_slider.css">
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container" style="margin-top: 50px;">
    <h2>Слайдер за допомогою бібліотеки Bootstrap</h2>
    
    <div id="myCarousel" class="carousel slide" data-ride="carousel">
        
        <ol class="carousel-indicators">
            <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
            <li data-target="#myCarousel" data-slide-to="1"></li>
            <li data-target="#myCarousel" data-slide-to="2"></li>
        </ol>

        <div class="carousel-inner">
            <div class="item active">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200&h=500&fit=crop" alt="Слайд 1">
                <div class="carousel-caption">
                    <h3>Назва 1</h3>
                    <p>Професійна підготовка за сучасними стандартами</p>
                </div>
            </div>

            <div class="item">
                <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1200&h=500&fit=crop" alt="Слайд 2">
                <div class="carousel-caption">
                    <h3>Назва 2</h3>
                    <p>Навчання у зручний для вас час</p>
                </div>
            </div>

            <div class="item">
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&h=500&fit=crop" alt="Слайд 3">
                <div class="carousel-caption">
                    <h3>Назва 3</h3>
                    <p>Отримайте сертифікат міжнародного зразка</p>
                </div>
            </div>
        </div>

        <a class="left carousel-control" href="#myCarousel" data-slide="prev">
            <span class="glyphicon glyphicon-chevron-left"></span>
            <span class="sr-only">Previous</span>
        </a>
        <a class="right carousel-control" href="#myCarousel" data-slide="next">
            <span class="glyphicon glyphicon-chevron-right"></span>
            <span class="sr-only">Next</span>
        </a>
    </div>
</div>

</body>
</html>
