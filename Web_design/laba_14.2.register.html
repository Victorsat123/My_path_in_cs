<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="Styles/laba_14.css">
</head>
<body>

    <div class="form-container">
        <h2>Реєстрація на курс</h2>
        <form id="regForm">
            <input type="text" id="regName" placeholder="Введіть ваше ім'я">
            <input type="email" id="regEmail" placeholder="Введіть email">
            <input type="password" id="regPassword" placeholder="Придумайте пароль (мін. 6 символів)">
            
            <button type="button" onclick="validateForm()">Зареєструватися</button>
        </form>
    </div>

    <script>
        function validateForm() {
            let name = document.getElementById("regName").value.trim();
            let email = document.getElementById("regEmail").value.trim();
            let password = document.getElementById("regPassword").value.trim();

            console.log("--- Спроба реєстрації ---");

            // Перевірка 1: Чи всі поля заповнені
            if (name === "" || email === "" || password === "") {
                alert("Помилка: Будь ласка, заповніть усі поля!");
                console.log("Статус: Відхилено (Порожні поля)");
                return; 
            }

            // Перевірка 2: Чи пароль не менше 6 символів
            if (password.length < 6) {
                alert("Помилка: Пароль має містити не менше 6 символів!");
                console.log("Статус: Відхилено (Короткий пароль: " + password.length + " симв.)");
                return;
            }

            // Якщо всі перевірки пройдені успішно
            alert(name + ", вітаємо! Ви успішно зареєстровані!");
            console.log("Статус: Успішно! Зареєстровано користувача " + name + " (" + email + ")");
            
        }
    </script>

</body>
</html>
