<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №14 - Завдання 2</title>
    <link rel="stylesheet" href="Styles/laba_14.css">
    <script src="laba_14.1.js" defer></script>
</head>
<body>

    <div class="task-section">
        <h3>1. Привітання користувача</h3>
        <form>
            <input type="text" id="userName" placeholder="Ваше ім'я">
            <button type="button" onclick="greetUser()">Привітати</button>
        </form>
    </div>

    <div class="task-section">
        <h3>2. Виведення повідомлення при зміні (Console)</h3>
        <p style="font-size: 12px; color: gray;">*Натисни F12 та відкрий Console перед тим, як писати сюди</p>
        <input type="text" id="inputField" placeholder="Почніть вводити текст..." oninput="showInput()">
    </div>

    <div class="task-section">
        <h3>3. Відміна стандартної відправки форми</h3>
        <form onsubmit="handleSubmit(event)">
            <input type="text" id="dataInput" placeholder="Введіть дані">
            <button type="submit">Надіслати</button>
        </form>
    </div>

</body>
</html>
