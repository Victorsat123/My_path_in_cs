<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота - Flex-меню</title>
    <style>
        /* Стилі для контейнера навігації */
        nav {
            display: flex;
            background-color: #333;
            padding: 10px;
            /* Розміщуємо пункти меню рівномірно */
            justify-content: space-evenly; 
        }

        /* Стилі для самих посилань */
        nav a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px; /* Трохи заокруглимо кути для краси */
            transition: background-color 0.3s; /* Плавна зміна кольору */
        }

        /* Ефект при наведенні курсора на посилання */
        nav a:hover {
            background-color: #555; /* Світліший сірий фон */
            color: #ffeb3b; /* Зміна кольору тексту на жовтуватий (за бажанням) */
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Головна</a>
        <a href="#">Про нас</a>
        <a href="#">Послуги</a>
        <a href="#">Контакти</a>
    </nav>

</body>
</html>
