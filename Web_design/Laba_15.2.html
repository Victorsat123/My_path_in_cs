<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Vanilla JS Slider - MindRise</title>
    <link rel="stylesheet" href="Styles/laba_15.css">
    <script src="demo_15.2.js" defer></script>
</head>
<body>

    <h2 style="text-align: center;">Слайдер на чистому JavaScript (Vanilla)</h2>

    <div class="slider">
        <div class="slider-track">
            <div class="slide"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800&h=400&fit=crop" alt="Slide 1"></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&h=400&fit=crop" alt="Slide 2"></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=400&fit=crop" alt="Slide 3"></div>
        </div>

        <button class="btn prev">&#10094;</button>
        <button class="btn next">&#10095;</button>
    </div>

</body>
</html>
