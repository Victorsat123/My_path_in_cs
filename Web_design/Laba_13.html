<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Знайомство з JS - Галерея Товарів</title>
    
    <style>
        body {
            background-color: #eef2f5; /* Змінений фон сторінки */
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #2c3e50;
        }

        #gallery {
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        #gallery img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>

    <script>
        var photosCount = 4;
        var currentPhotoIndex = 1;

        // Функція для зміни існуючого фото
        function showNextPhoto() {
            currentPhotoIndex++;
            if(currentPhotoIndex > photosCount) {
                currentPhotoIndex = 1;
            }
            
            var elem = document.getElementById("currentPhoto");
            elem.src = "Pictures/laptop" + currentPhotoIndex + ".jpg";
        }

        // Функція для додавання нового фото поруч
        function addNextPhoto() {
            var newImage = document.createElement("img");
            
            currentPhotoIndex++;
            if(currentPhotoIndex > photosCount) {
                currentPhotoIndex = 1;
            }
            
            newImage.src = "Pictures/laptop" + currentPhotoIndex + ".jpg";
            
            var containerElem = document.getElementById("gallery");
            containerElem.appendChild(newImage);
        }
    </script>
</head>
<body>

    <h1>Каталог Товарів: Ноутбуки</h1>

    <div id="gallery">
        <img id="currentPhoto" src="Pictures/laptop1.jpg" alt="Фото товару" />
    </div>
    <button onclick="showNextPhoto()">Наступне</button>
    <button onclick="addNextPhoto()">Додати фото</button>

</body>
</html>
